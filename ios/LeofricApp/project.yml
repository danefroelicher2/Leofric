name: LeofricApp
options:
  bundleIdPrefix: com.danefroelicher
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Dane's personal team — without this, every `xcodegen generate` wipes the
    # Team picked in Xcode's Signing & Capabilities and device builds fail.
    DEVELOPMENT_TEAM: 9N735S4L4M
targets:
  LeofricApp:
    type: application
    platform: iOS
    sources:
      - path: LeofricApp
    info:
      path: LeofricApp/Info.plist
      properties:
        CFBundleDisplayName: Leofric
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          # ATS exempts .local names and raw IPs, but NOT hostnames — without
          # this, http://<mac>.tailXXXX.ts.net:5000 is silently blocked and the
          # live feed spins forever when remote. Plain HTTP inside the tailnet
          # is fine: Tailscale wraps it in WireGuard end-to-end.
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocalNetworkUsageDescription: >-
          Leofric connects to your Mac Mini on the local network to show
          the live camera feed and node status.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danefroelicher.Leofric
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: LeofricApp/LeofricApp.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.danefroelicher.Leofric
    scheme:
      testTargets:
        - LeofricAppTests
    dependencies:
      - target: NotificationService
        embed: true
  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danefroelicher.Leofric.NotificationService
    info:
      path: NotificationService/Info.plist
      properties:
        CFBundleDisplayName: LeofricNotification
        # The extension fetches snapshot photos from the same base URL as the
        # app; it needs the same ATS carve-outs or remote (ts.net) photo
        # pushes arrive without their image.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: NotificationService/NotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.danefroelicher.Leofric
  LeofricAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LeofricAppTests
    dependencies:
      - target: LeofricApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
