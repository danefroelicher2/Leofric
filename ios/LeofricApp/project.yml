name: LeofricApp
options:
  bundleIdPrefix: com.danefroelicher
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
targets:
  LeofricApp:
    type: application
    platform: iOS
    sources:
      - path: LeofricApp
    info:
      path: LeofricApp/Info.plist
      properties:
        CFBundleDisplayName: Leofric
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: >-
          Leofric connects to your Mac Mini on the local network to show
          the live camera feed and node status.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danefroelicher.Leofric
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - LeofricAppTests
  LeofricAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LeofricAppTests
    dependencies:
      - target: LeofricApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
